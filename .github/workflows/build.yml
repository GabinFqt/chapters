name: Build

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle build
        run: chmod +x ./gradlew && ./gradlew build --no-daemon
