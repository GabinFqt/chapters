modLoader="javafml"
loaderVersion="[4,)"
license="MIT"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
logoFile="chapters_logo.png"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="[${minecraft_version}]"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="kubejs"
type="optional"
versionRange="[2101.7.2,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="jei"
type="optional"
versionRange="[19,)"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="mekanism"
type="optional"
versionRange="[10.7.19,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftblibrary"
type="optional"
versionRange="[2101.1.0,)"
ordering="BEFORE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftbteams"
type="optional"
versionRange="[2101.1.0,)"
ordering="BEFORE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftbquests"
type="optional"
versionRange="[2101.1.0,)"
ordering="NONE"
side="BOTH"

[[mixins]]
config="${mod_id}.mixins.json"
